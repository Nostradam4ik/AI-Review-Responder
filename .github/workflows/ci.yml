name: Backend CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: reviewdb_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:test@localhost:5432/reviewdb_test
      # conftest.py reads PYTEST_DB_URL to build the async test engine
      PYTEST_DB_URL: postgresql+psycopg://postgres:test@localhost:5432/reviewdb_test
      SECRET_KEY: test-secret-key-minimum-32-characters-long
      GOOGLE_CLIENT_ID: test
      GOOGLE_CLIENT_SECRET: test
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/callback
      GROQ_API_KEY: test-key
      TOKEN_ENCRYPTION_KEY: test-encryption-key-32-characters!
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m pytest tests/ -x --tb=short -q
